<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>

<h2>Dashboard</h2>

<input id="tIn" placeholder="Add task"/>
<button onclick="addTodo()">Add</button>

<div id="tList"></div>

<br>

<div>
📚 Books: <span id="cBooks">0</span><br>
❤️ Wishlist: <span id="cWish">0</span><br>
✅ Done today: <span id="cDone">0</span><br>
👤 Role: <span id="cRole">—</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const SB_URL = "https://zqtqvnvylwzshwqwnkhz.supabase.co";
const SB_KEY = "YOUR_ANON_KEY";
const sb = supabase.createClient(SB_URL, SB_KEY);

let me = null;
let todos = [];
let userRole = "student";

// ✅ Load Role
async function loadUserRole() {
  const { data } = await sb
    .from("profiles")
    .select("role")
    .eq("id", me.id)
    .single();

  userRole = data?.role || "student";
  document.getElementById("cRole").textContent = userRole;
}

// ✅ Load Todos
async function fetchTodos() {
  const { data } = await sb
    .from("todos")
    .select("*")
    .or(`user_id.eq.${me.id},assigned_to.eq.${me.id}`);

  todos = data || [];
  renderTodos();
}

// ✅ Add Todo
async function addTodo() {
  const text = document.getElementById("tIn").value;
  if (!text) return;

  await sb.from("todos").insert([{
    text,
    done: false,
    user_id: userRole === "student" ? me.id : null,
    assigned_to: me.id,
    created_by: me.id
  }]);

  fetchTodos();
}

// ✅ Render Todos
function renderTodos() {
  const list = document.getElementById("tList");
  list.innerHTML = todos.map(t => `
    <div>
      ${t.text}
      <button onclick="toggle(${t.id}, ${t.done})">${t.done ? "Undo" : "Done"}</button>
    </div>
  `).join("");
}

// ✅ Toggle Done
async function toggle(id, done) {
  await sb.from("todos")
    .update({ done: !done })
    .eq("id", id);

  fetchTodos();
}

// ✅ Restrict UI
function applyRoleUI() {
  if (userRole === "student") {
    console.log("Student mode");
  }
}

// ✅ Init
async function init() {
  const { data } = await sb.auth.getUser();

  if (data.user) {
    me = data.user;
    await loadUserRole();
    await fetchTodos();
    applyRoleUI();
  } else {
    alert("Login first");
  }
}

init();

</script>
</body>
</html>
